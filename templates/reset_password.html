<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<body class="otp-page">

<div class="otp-container">
    <h2>Reset Password</h2>

    </form>
</div>

</body>
</html>
