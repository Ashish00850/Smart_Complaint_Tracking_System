<!DOCTYPE html>
<html>

<head>
    <title>Student Registration</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>


    <h2>Student Registration</h2>

    <form action="/register" method="POST">

        <label>Name</label><br>
        <input type="text" name="name" required placeholder="Enter your name"><br><br>

        <label>Email</label><br>
        <input type="email" name="email" required placeholder="Enter your email"><br><br>

        <label>Phone</label><br>
        <input type="phone" name="phone" required placeholder="Enter your phone"><br><br>


        <label>Password</label><br>
        <input type="password" name="password" required placeholder="Create your password"><br><br>

        <button type="submit">Register</button>

    </form>

    <br>

    <a href="/">Already have an account? Login</a>

</footer>


</body>

</html>
