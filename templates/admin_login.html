<!DOCTYPE html>
<html>

<head>
<title>Admin Login</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<h2>Admin Login</h2>
{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<form method="POST">

<label>Email</label>
<input type="email" name="email" required>

<br><br>

<label>Password</label>
<input type="password" name="password" required>

<br><br>

<button type="submit">Login</button>

</form>
<footer class="footer">
<p>© 2026 Smart Complaint Tracking System | All Rights Reserved</p>
<p>Email: support@complaintsystem.com</p>
</footer>

</body>
</html>
