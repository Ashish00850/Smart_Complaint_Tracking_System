<!DOCTYPE html>
<html>

<head>
    <title>Admin Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <body class="login-page"></body>
    <div class="navbar">

        <h2 class="logo">Smart Complaint System</h2>

        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/about">About</a></li>
            <li><a href="/contact">Contact</a></li>
        </ul>

    </div>

    <h2>Admin Login</h2>
    {% if error %}
    <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST">

        <label>Email</label>
        <input type="email" name="email" required>

        <br><br>

        <label>Password</label>
        <input type="password" name="password" required>

        <br><br>

        <button type="submit">Login</button>

    </form>
    <br><br />
    <br><br />
    <br><br />
    <br><br />
    <br><br />
    <br><br />
    <br><br />
    <br><br />
    <br><br />

    <footer class="footer">
        <p>© 2026 Smart Complaint Tracking System | All Rights Reserved</p>
        <p>Email: quickresolve1@gmail.com</p>
    </footer>

</body>

</html>
